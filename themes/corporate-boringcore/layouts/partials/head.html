<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="generator" content="Hugo :: Corporate Boringcore v1.0">
<title>{{ if .IsHome }}{{ .Site.Title }} :: {{ with .Site.Params.subtitle }}{{ . }}{{ else }}Home{{ end }}{{ else }}{{ .Title }} :: {{ .Site.Title }}{{ end }}</title>
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
{{ with .OutputFormats.Get "rss" }}
  <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .RelPermalink }}">
{{ end }}
<script>
(function () {
  try {
    var s = localStorage.getItem('skin');
    var allowed = ['classic','light','dark','hacker','amber'];
    if (s && allowed.indexOf(s) !== -1 && s !== 'classic') {
      document.documentElement.setAttribute('data-theme', s);
    }
  } catch (e) {}
})();
</script>
